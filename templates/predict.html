<!DOCTYPE html>
<html>
<head>
    <title>Predict</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎓 Grade Predictor</a>
        <a href="/history" class="btn btn-warning">History</a>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height: 90vh;">
    
    <div class="glass-card p-5">

        <h2 class="text-center mb-4 fw-bold">Enter Student Details</h2>

        <form action="/predict" method="post">

            <input type="number" class="form-control custom-input mb-3" name="study_hours" placeholder="📘 Study Hours" required>

            <input type="number" class="form-control custom-input mb-3" name="attendance" placeholder="📊 Attendance %" required>

            <input type="number" class="form-control custom-input mb-3" name="assignments" placeholder="📝 Assignments (out of 10)" required>

            <button class="btn btn-gradient w-100 mt-2">Predict 🚀</button>

        </form>

    </div>

</div>
</body>
</html>
