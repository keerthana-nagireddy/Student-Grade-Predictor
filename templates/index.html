<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Predictor</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">🎓 Student Grade Predictor</h2>

        <form action="/predict" method="post">
            
            <div class="mb-3">
                <label>Study Hours</label>
                <input type="number" class="form-control" name="study_hours" required>
            </div>

            <div class="mb-3">
                <label>Attendance (%)</label>
                <input type="number" class="form-control" name="attendance" required>
            </div>

            <div class="mb-3">
                <label>Assignments Completed</label>
                <input type="number" class="form-control" name="assignments" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Predict Grade
            </button>

        </form>
    </div>
</div>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
